services:
  api:
    build: ./services/api
    environment:
      REGOS_OFFLINE: "1"
      REGOS_SESSION_SECRET: local-only-demo-session-secret-32-bytes-minimum
      REGOS_WEB_ORIGIN: http://localhost:3000
    ports:
      - "8000:8000"

  web:
    build:
      context: ./web
      args:
        REGOS_API_ORIGIN: http://api:8000
    environment:
      REGOS_API_ORIGIN: http://api:8000
    depends_on:
      - api
    ports:
      - "3000:3000"
