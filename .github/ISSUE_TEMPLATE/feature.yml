name: Feature proposal
description: Propose a scoped product, motion, documentation, or repository improvement.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What concrete problem does this solve?
    validations:
      required: true

  - type: dropdown
    id: scope
    attributes:
      label: Product tier
      options:
        - P0 prototype
        - P1 roadmap
        - Vision
        - Motion or documentation only
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed change
      description: Describe the smallest coherent implementation and its evidence.
    validations:
      required: true

  - type: textarea
    id: validation
    attributes:
      label: Validation
      description: How will we know this works without overstating the result?
    validations:
      required: true
